name: Image Build

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build from (branch, tag, or SHA)
        required: true
        type: string
        default: main
      version:
        description: Optional version/tag override for the image
        required: false
        type: string
      push:
        description: Push the built image to GHCR
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve:
    name: Resolve build parameters
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'always-further/nono' &&
      ((github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    outputs:
      ref: ${{ steps.params.outputs.ref }}
      version: ${{ steps.params.outputs.version }}
      push: ${{ steps.params.outputs.push }}
    steps:
      - name: Compute parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WD_REF: ${{ inputs.ref }}
          WD_VERSION: ${{ inputs.version }}
          WD_PUSH: ${{ inputs.push }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="$WR_HEAD_BRANCH"
            # Skip prereleases
            if [[ "$TAG" == *alpha* ]] || [[ "$TAG" == *beta* ]] || [[ "$TAG" == *rc* ]]; then
              echo "Skipping prerelease tag: $TAG"
              echo "push=false" >> "$GITHUB_OUTPUT"
              echo "ref=$TAG" >> "$GITHUB_OUTPUT"
              echo "version=$TAG" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "ref=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$WD_REF" >> "$GITHUB_OUTPUT"
            echo "version=${WD_VERSION:-$WD_REF}" >> "$GITHUB_OUTPUT"
            echo "push=$WD_PUSH" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    name: Build ${{ matrix.target }} image binary
    needs: resolve
    if: ${{ needs.resolve.outputs.push != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            output_name: nono-amd64
          - target: aarch64-unknown-linux-gnu
            output_name: nono-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Install system dependencies (x86_64)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build (x86_64)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p nono-cli

      - name: Build (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target aarch64-unknown-linux-gnu -p nono-cli

      - name: Prepare binary artifact
        run: |
          mkdir -p image-artifact
          cp "target/${{ matrix.target }}/release/nono" "image-artifact/${{ matrix.output_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.output_name }}
          path: image-artifact/${{ matrix.output_name }}

  build-image:
    name: Build image
    needs: [resolve, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nono-amd64
          path: docker-context/

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nono-arm64
          path: docker-context/

      - name: Prepare Docker context
        run: |
          cp docker/Dockerfile-CI docker-context/Dockerfile
          chmod +x docker-context/nono-amd64 docker-context/nono-arm64

      - name: Resolve image metadata
        id: meta
        env:
          BUILD_VERSION: ${{ needs.resolve.outputs.version }}
          BUILD_REF: ${{ needs.resolve.outputs.ref }}
          BUILD_PUSH: ${{ needs.resolve.outputs.push }}
        run: |
          RAW_VERSION="$BUILD_VERSION"
          if [ -z "$RAW_VERSION" ]; then
            RAW_VERSION="$BUILD_REF"
          fi

          RAW_VERSION="${RAW_VERSION#refs/heads/}"
          RAW_VERSION="${RAW_VERSION#refs/tags/}"
          VERSION="${RAW_VERSION#v}"
          REF_SLUG="$(printf '%s' "$BUILD_REF" | tr '/:@' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "$REF_SLUG" ]; then
            REF_SLUG="manual"
          fi

          SHA_SHORT="$(git rev-parse --short=12 HEAD)"
          if [ -z "$VERSION" ]; then
            VERSION="${REF_SLUG}-${SHA_SHORT}"
          fi

          STABLE=true
          if [[ "$VERSION" == *alpha* ]] || [[ "$VERSION" == *beta* ]] || [[ "$VERSION" == *rc* ]]; then
            STABLE=false
          fi

          TAGS="ghcr.io/always-further/nono:${VERSION}"
          if [ "$BUILD_PUSH" = "true" ] && [ "$STABLE" = "true" ] && [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            MAJOR_MINOR="${VERSION%.*}"
            TAGS="${TAGS},ghcr.io/always-further/nono:${MAJOR_MINOR}"
            TAGS="${TAGS},ghcr.io/always-further/nono:latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ghcr.io
        if: ${{ needs.resolve.outputs.push == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: docker-context
          file: docker-context/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.resolve.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/always-further/nono
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.description=Capability-based sandboxing for untrusted AI agents

      - name: Install Cosign
        if: ${{ needs.resolve.outputs.push == 'true' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with Cosign
        if: ${{ needs.resolve.outputs.push == 'true' }}
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/always-further/nono@${IMAGE_DIGEST}"
